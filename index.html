<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viaturas Importadas | EcoImport — Importação de Automóveis</title>
<meta name="description" content="Catálogo de viaturas importadas com garantia oficial. Mercedes-Benz, Audi, Porsche, Range Rover. Serviço chave-na-mão.">
<link rel="icon" href="https://ecoimport.pt/wp-content/uploads/2024/09/cropped-favicon-ecoimport-32x32.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0D1117;color:#fff;min-height:100vh}
a{text-decoration:none;color:inherit}

.header{border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:40;background:rgba(13,17,23,.95);backdrop-filter:blur(12px)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo span{color:#1B9C85}
.logo-sub{font-size:11px;color:#8B949E;margin-top:2px}
.header-btns{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-whatsapp{background:#25D366;color:#fff}
.btn-site{background:#1B9C85;color:#fff}
.btn:hover{opacity:.85;transform:translateY(-1px)}

.hero{max-width:1200px;margin:0 auto;padding:48px 20px 40px}
.hero-tag{color:#1B9C85;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.hero h2{font-size:clamp(28px,5vw,48px);font-weight:700;line-height:1.15;margin-bottom:16px}
.hero h2 span{color:#1B9C85}
.hero-desc{color:#8B949E;font-size:17px;line-height:1.6;max-width:540px;margin-bottom:32px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-lg{padding:12px 28px;font-size:15px;border-radius:8px}
.btn-outline{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}

.sep{height:1px;background:rgba(255,255,255,.1);max-width:1200px;margin:0 auto}

.filters{max-width:1200px;margin:0 auto;padding:20px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;background:rgba(255,255,255,.05);color:#8B949E;border:none;cursor:pointer;transition:all .2s}
.pill:hover{background:rgba(255,255,255,.1);color:#fff}
.pill.active{background:#1B9C85;color:#0D1117}
.filter-count{color:#8B949E;font-size:13px}
.sort-btns{display:flex;gap:6px}

.grid{max-width:1200px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

.card{background:#161B22;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:all .3s}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);border-color:rgba(27,156,133,.3)}
.card-img{position:relative;width:100%;height:220px;overflow:hidden;background:#0D1117}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.05)}
.card-badge{position:absolute;top:12px;left:12px;background:rgba(27,156,133,.9);backdrop-filter:blur(8px);color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:700}
.card-fuel{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);color:#8B949E;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500}
.card-body{padding:16px 18px 18px}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px;line-height:1.3}
.card-specs{display:flex;gap:12px;color:#8B949E;font-size:12px;margin-bottom:14px;flex-wrap:wrap}
.card-specs span{display:flex;align-items:center;gap:4px}
.card-actions{display:flex;gap:8px}
.card-btn{flex:1;padding:10px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;transition:all .2s;border:none;cursor:pointer}
.card-btn-wa{background:#25D366;color:#fff}
.card-btn-site{background:rgba(27,156,133,.15);color:#1B9C85;border:1px solid rgba(27,156,133,.3)}
.card-btn:hover{opacity:.85}

.footer{border-top:1px solid rgba(255,255,255,.1);padding:30px 20px;text-align:center;color:#8B949E;font-size:13px}
.footer a{color:#1B9C85}

.no-results{text-align:center;padding:60px 20px;color:#8B949E;font-size:16px}

@media(max-width:640px){
.hero{padding:32px 16px 24px}
.grid{grid-template-columns:1fr;padding:0 16px 40px}
.header-inner{padding:12px 16px}
.filters{padding:16px}
}
</style>
</head>
<body>

<header class="header">
<div class="header-inner">
<div>
<div class="logo">ECO<span>IMPORT</span></div>
<div class="logo-sub">Importação de Automóveis</div>
</div>
<div class="header-btns">
<a href="https://wa.me/351927586636?text=Ol%C3%A1%2C%20vi%20o%20vosso%20cat%C3%A1logo%20e%20gostaria%20de%20saber%20mais." target="_blank"><button class="btn btn-whatsapp">WhatsApp</button></a>
<a href="https://ecoimport.pt/contactos/" target="_blank"><button class="btn btn-site">ecoimport.pt</button></a>
</div>
</div>
</header>

<section class="hero">
<p class="hero-tag" id="count-tag"></p>
<h2>Viaturas Importadas<br>com <span>Garantia Oficial</span></h2>
<p class="hero-desc">Veículos importados da Europa com verificação completa, ISV e legalização incluídos. Serviço chave-na-mão.</p>
<div class="hero-actions">
<a href="https://wa.me/351927586636?text=Ol%C3%A1%2C%20gostaria%20de%20um%20or%C3%A7amento%20de%20importa%C3%A7%C3%A3o." target="_blank"><button class="btn btn-lg btn-whatsapp">Pedir Orçamento</button></a>
<a href="https://ecoimport.pt/simulador-de-isv/" target="_blank"><button class="btn btn-lg btn-outline">Simulador ISV</button></a>
</div>
</section>

<div class="sep"></div>

<div class="filters">
<div class="filter-pills" id="filters"></div>
<div>
<span class="filter-count" id="filter-count"></span>
<div class="sort-btns" style="display:inline-flex;margin-left:12px">
<button class="pill active" data-sort="recente">Recentes</button>
<button class="pill" data-sort="km">Km ↑</button>
<button class="pill" data-sort="ano">Ano ↓</button>
</div>
</div>
</div>

<div class="grid" id="grid"></div>

<footer class="footer">
<p>EcoImport — Importação de Automóveis &middot; <a href="https://ecoimport.pt" target="_blank">ecoimport.pt</a> &middot; Tel: <a href="tel:+351927586636">927 586 636</a></p>
</footer>

<script>
const vehicles = [
  {id:5424,title:"Mercedes-Benz EQC 400 4Matic AMG",marca:"Mercedes-Benz",modelo:"EQC 400 4Matic AMG",ano:2022,combustivel:"100% Elétrico",potencia:"408cv",km:"13.660",link:"https://ecoimport.pt/importacoes/mercedes-eqc-400-amg-2022/",img:"https://ecoimport.pt/wp-content/uploads/2026/03/IMG_5213-1024x576.jpg"},
  {id:5413,title:"Mercedes-Benz GLC 300de 4Matic",marca:"Mercedes-Benz",modelo:"GLC 300de 4Matic",ano:2020,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"306cv / 1993 cm3",km:"196.197",link:"https://ecoimport.pt/importacoes/mercedes-glc-300de-4matic-2020/",img:"https://ecoimport.pt/wp-content/uploads/2026/03/IMG_5366-1024x576.jpg"},
  {id:5402,title:"Mercedes-Benz C 300e T AMG 2024",marca:"Mercedes-Benz",modelo:"C 300e T AMG",ano:2024,combustivel:"Híbrido Plug-in / Gasolina",potencia:"333cv / 1999 cm3",km:"11.780",link:"https://ecoimport.pt/importacoes/mercedes-c300e-t-amg-2024/",img:"https://ecoimport.pt/wp-content/uploads/2026/03/IMG_3233-1024x576.jpg"},
  {id:5391,title:"Mercedes-Benz CLA 250e Shooting Brake AMG",marca:"Mercedes-Benz",modelo:"CLA 250e SB AMG",ano:2022,combustivel:"Híbrido Plug-in / Gasolina",potencia:"218cv / 1332 cm3",km:"36.595",link:"https://ecoimport.pt/importacoes/mercedes-cla-250e-sb-amg-2022/",img:"https://ecoimport.pt/wp-content/uploads/2026/03/IMG_3304-1024x576.jpg"},
  {id:4717,title:"Mercedes-Benz E300de T AMG",marca:"Mercedes-Benz",modelo:"E300de T AMG",ano:2021,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"306cv / 1950 cm3",km:"96.000",link:"https://ecoimport.pt/importacoes/mercedes-benz-e300de-t-amg/",img:"https://ecoimport.pt/wp-content/uploads/2025/12/1-2-1024x576.png"},
  {id:4653,title:"Mercedes-Benz EQA 250 AMG",marca:"Mercedes-Benz",modelo:"EQA 250 AMG",ano:2022,combustivel:"100% Elétrico",potencia:"190cv",km:"18.000",link:"https://ecoimport.pt/importacoes/mercedes-benz-eqa-250/",img:"https://ecoimport.pt/wp-content/uploads/2026/01/50-1024x576.png"},
  {id:4638,title:"Mercedes-Benz E300de AMG",marca:"Mercedes-Benz",modelo:"E300de AMG",ano:2022,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"306cv / 1950 cm3",km:"65.000",link:"https://ecoimport.pt/importacoes/mercedes-benz-e300de-amg/",img:"https://ecoimport.pt/wp-content/uploads/2025/12/36-1024x576.png"},
  {id:4584,title:"Mercedes-Benz GLE 350 de",marca:"Mercedes-Benz",modelo:"GLE 350 de",ano:2023,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"320cv / 1950 cm3",km:"67.000",link:"https://ecoimport.pt/importacoes/mercedes-benz-gle-350-de/",img:"https://ecoimport.pt/wp-content/uploads/2025/12/66-1-1024x576.png"},
  {id:4525,title:"Audi A6 Sedan 50",marca:"Audi",modelo:"A6 Sedan 50 TFSI e",ano:2020,combustivel:"Híbrido Plug-in / Gasolina",potencia:"299cv / 1984 cm3",km:"107.000",link:"https://ecoimport.pt/importacoes/audi-a6-sedan-50/",img:"https://ecoimport.pt/wp-content/uploads/2025/11/mercedes-e300e-50-23-1-1-1024x768.jpg"},
  {id:4480,title:"Mercedes-Benz GLC 300de",marca:"Mercedes-Benz",modelo:"GLC 300de 4MATIC",ano:2020,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"306cv / 1950 cm3",km:"112.000",link:"https://ecoimport.pt/importacoes/mercedes-benz-glc-300de/",img:"https://ecoimport.pt/wp-content/uploads/2025/10/mercedes-benz-GLC-300de-21-1-1024x768.jpg"},
  {id:4435,title:"Mini Cooper Countryman",marca:"Mini",modelo:"Cooper Countryman",ano:2012,combustivel:"Gasolina",potencia:"122cv / 1499 cm3",km:"109.000",link:"https://ecoimport.pt/importacoes/mini-cooper-countryman/",img:"https://ecoimport.pt/wp-content/uploads/2025/09/Mini-countryman-1024x576.png"},
  {id:4420,title:"Mercedes-Benz E300e",marca:"Mercedes-Benz",modelo:"E300e",ano:2021,combustivel:"Híbrido Plug-in / Gasolina",potencia:"320cv / 1991 cm3",km:"62.000",link:"https://ecoimport.pt/importacoes/mercedes-e300-de-amg-station/",img:"https://ecoimport.pt/wp-content/uploads/2025/11/mercedes-e300e-11-2-Medium.jpg"},
  {id:4351,title:"Range Rover Sport 3.0e",marca:"Land Rover",modelo:"Range Rover Sport P440e",ano:2023,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"441cv / 2296 cm3",km:"45.000",link:"https://ecoimport.pt/importacoes/range-rover-sport/",img:"https://ecoimport.pt/wp-content/uploads/2025/03/range-rover-01-1024x768.jpg"},
  {id:4159,title:"Mercedes-Benz C300de AMG",marca:"Mercedes-Benz",modelo:"C300de AMG",ano:2021,combustivel:"Híbrido Plug-in / Gasóleo",potencia:"306cv / 1950 cm3",km:"99.000",link:"https://ecoimport.pt/importacoes/mercedes-c300-de-amg/",img:"https://ecoimport.pt/wp-content/uploads/2024/10/mercedes-c300-08-1024x768.jpg"},
  {id:3505,title:"Porsche Macan S",marca:"Porsche",modelo:"Macan S",ano:2018,combustivel:"Diesel",potencia:"230cv / 3000 cm3",km:"160.000",link:"https://ecoimport.pt/importacoes/porsche-macan/",img:"https://ecoimport.pt/wp-content/uploads/2024/10/porche-macan-10-1024x768.jpg"}
];

const waBase = "https://wa.me/351927586636?text=";

// Filters
const marcas = [...new Set(vehicles.map(v=>v.marca))].sort();
const combustiveis = [...new Set(vehicles.map(v=>{
  if(v.combustivel.includes('Elétrico'))return 'Elétrico';
  if(v.combustivel.includes('Plug-in'))return 'Híbrido Plug-in';
  if(v.combustivel.includes('Diesel'))return 'Diesel';
  return 'Gasolina';
}))];

let activeFilter = 'todos';
let activeSort = 'recente';

function fuelTag(c){
  if(c.includes('Elétrico'))return 'Elétrico';
  if(c.includes('Plug-in'))return 'PHEV';
  if(c.includes('Diesel'))return 'Diesel';
  return 'Gasolina';
}

function renderFilters(){
  const f=document.getElementById('filters');
  let html='<button class="pill active" data-filter="todos">Todos</button>';
  marcas.forEach(m=>{html+='<button class="pill" data-filter="marca:'+m+'">'+m+'</button>'});
  combustiveis.forEach(c=>{html+='<button class="pill" data-filter="fuel:'+c+'">'+c+'</button>'});
  f.innerHTML=html;
  f.querySelectorAll('.pill').forEach(p=>{
    p.addEventListener('click',function(){
      f.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');
      activeFilter=this.dataset.filter;
      render();
    });
  });
}

function getFiltered(){
  let list=[...vehicles];
  if(activeFilter!=='todos'){
    if(activeFilter.startsWith('marca:')){
      const m=activeFilter.split(':')[1];
      list=list.filter(v=>v.marca===m);
    }else if(activeFilter.startsWith('fuel:')){
      const f=activeFilter.split(':')[1];
      list=list.filter(v=>{
        if(f==='Elétrico')return v.combustivel.includes('Elétrico');
        if(f==='Híbrido Plug-in')return v.combustivel.includes('Plug-in');
        if(f==='Diesel')return v.combustivel==='Diesel';
        return v.combustivel==='Gasolina';
      });
    }
  }
  if(activeSort==='km')list.sort((a,b)=>parseInt(a.km.replace(/\D/g,''))-parseInt(b.km.replace(/\D/g,'')));
  else if(activeSort==='ano')list.sort((a,b)=>b.ano-a.ano);
  else list.sort((a,b)=>b.id-a.id);
  return list;
}

function render(){
  const list=getFiltered();
  const grid=document.getElementById('grid');
  document.getElementById('count-tag').textContent='Stock disponível · '+vehicles.length+' viaturas';
  document.getElementById('filter-count').textContent=list.length+' viaturas';

  if(list.length===0){
    grid.innerHTML='<div class="no-results">Nenhuma viatura encontrada com estes filtros.</div>';
    return;
  }

  grid.innerHTML=list.map(v=>{
    const waMsg=encodeURIComponent('Olá, tenho interesse no '+v.title+' ('+v.ano+', '+v.km+' km). Podem enviar mais informações?');
    return '<div class="card">'+
      '<a href="'+v.link+'" target="_blank" class="card-img">'+
        '<img src="'+v.img+'" alt="'+v.title+'" loading="lazy">'+
        '<div class="card-badge">'+v.ano+'</div>'+
        '<div class="card-fuel">'+fuelTag(v.combustivel)+'</div>'+
      '</a>'+
      '<div class="card-body">'+
        '<div class="card-title">'+v.title+'</div>'+
        '<div class="card-specs">'+
          '<span>'+v.potencia.split('/')[0].trim()+'</span>'+
          '<span>'+v.km+' km</span>'+
          '<span>'+v.combustivel.split('/')[0].trim()+'</span>'+
        '</div>'+
        '<div class="card-actions">'+
          '<a href="'+waBase+waMsg+'" target="_blank" class="card-btn card-btn-wa" style="flex:1;display:block">WhatsApp</a>'+
          '<a href="'+v.link+'" target="_blank" class="card-btn card-btn-site" style="flex:1;display:block">Ver Ficha</a>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// Sort buttons
document.querySelectorAll('[data-sort]').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    activeSort=this.dataset.sort;
    render();
  });
});

renderFilters();
render();
</script>
</body>
</html>
